services:
  backend:
    build:
      context: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgres://postgres:-Lucano2030@bd_database:5432/bd?sslmode=disable
    expose:
      - "8000"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      easypanel_net:
        aliases:
          - backend

  frontend:
    build:
      context: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      easypanel_net:
        aliases:
          - frontend

volumes:
  backend_uploads:

networks:
  easypanel_net:
    name: easypanel
    external: true
