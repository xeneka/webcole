services:
  bd_database:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: -Lucano2030
      POSTGRES_DB: bd
    ports:
      # Exponer en este puerto te permite conectarte de forma local usando psql, DBeaver, etc.
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      # Conexión local al contenedor PostgreSQL mediante la URL aportada
      - DATABASE_URL=postgres://postgres:-Lucano2030@bd_database:5432/bd?sslmode=disable
    ports:
      - "8000:8000"
    volumes:
      # Mapear los uploads locales para persistencia también en debugging
      - ./backend/uploads:/app/uploads
    depends_on:
      - bd_database

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  # Volumen para persistir la base de datos localmente
  postgres_data:
