services:
  backend:
    build:
      context: ./backend
    restart: always
    environment:
      # Conecta directamente a la base de datos alojada en Easypanel
      - DATABASE_URL=postgres://postgres:-Lucano2030@bd_database:5432/bd?sslmode=disable
    expose:
      # Usamos 'expose' para no causar colisión de puertos en el host de Easypanel
      - "8000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  backend_uploads:

networks:
  default:
    # Esto une este proyecto a la misma red general que usa Easypanel,
    # permitiendo que nuestro backend encuentre a la base de datos externa.
    name: easypanel
    external: true
